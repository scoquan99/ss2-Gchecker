<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Sign In | Text Quality Checker</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(145deg, #f8fafc 0%, #eef2f8 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      top: -20%; left: -10%;
      width: 60%; height: 60%;
      background: radial-gradient(circle, rgba(99,102,241,0.08) 0%, rgba(99,102,241,0) 70%);
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: "";
      position: fixed;
      bottom: -10%; right: -5%;
      width: 55%; height: 55%;
      background: radial-gradient(circle, rgba(236,72,153,0.06) 0%, rgba(236,72,153,0) 70%);
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }

    .page-wrapper {
      max-width: 480px;
      width: 100%;
      position: relative;
      z-index: 2;
    }

    /* Hero */
    .hero-section { text-align: center; margin-bottom: 2rem; }

    .badge-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-bottom: 1.2rem;
    }

    .free-badge {
      background: rgba(99,102,241,0.12);
      backdrop-filter: blur(2px);
      padding: 0.3rem 1rem;
      border-radius: 40px;
      font-size: 0.8rem;
      font-weight: 500;
      color: #4f46e5;
      letter-spacing: 0.3px;
      border: 1px solid rgba(79,70,229,0.2);
    }

    .hero-section h1 {
      font-size: 2.8rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #1E293B, #3B4D6B, #4f46e5);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      margin-bottom: 0.4rem;
    }

    .hero-section p {
      color: #4b5563;
      font-weight: 500;
      font-size: 0.95rem;
    }

    /* Card */
    .auth-card {
      background: rgba(255,255,255,0.96);
      backdrop-filter: blur(2px);
      border-radius: 2rem;
      box-shadow: 0 20px 35px -12px rgba(0,0,0,0.08), 0 0 0 1px rgba(0,0,0,0.02);
      padding: 2.2rem 2rem;
      border: 1px solid rgba(255,255,255,0.6);
      animation: fadeUp 0.35s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-header { margin-bottom: 1.8rem; }

    .card-header h2 {
      font-size: 1.9rem;
      font-weight: 700;
      background: linear-gradient(120deg, #1e293b, #2d3a4e);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -0.3px;
    }

    .card-sub {
      font-size: 0.85rem;
      color: #5b6e8c;
      margin-top: 0.4rem;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .card-sub i { font-size: 0.7rem; color: #818cf8; }

    /* Inputs */
    .input-group {
      margin-bottom: 1.3rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .input-group label {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #334155;
    }

    .input-field {
      display: flex;
      align-items: center;
      background: #f1f5f9;
      border-radius: 1.2rem;
      padding: 0.65rem 1rem;
      border: 1px solid #e2e8f0;
      transition: all 0.2s;
    }

    .input-field i { color: #94a3b8; font-size: 1rem; margin-right: 0.7rem; }

    .input-field input {
      border: none;
      background: transparent;
      width: 100%;
      font-size: 0.95rem;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
      outline: none;
      color: #0f172a;
    }

    .input-field input::placeholder { color: #94a3b8; font-weight: 400; }

    .input-field:focus-within {
      border-color: #818cf8;
      box-shadow: 0 0 0 3px rgba(79,70,229,0.15);
      background: #fff;
    }

    /* Button */
    .action-btn {
      width: 100%;
      background: #0f172a;
      color: white;
      font-weight: 700;
      padding: 0.875rem 0;
      border: none;
      border-radius: 2rem;
      font-size: 0.95rem;
      letter-spacing: 0.3px;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 0.6rem;
      margin-bottom: 1rem;
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .action-btn:hover { background: #2d3a5e; transform: scale(0.98); box-shadow: 0 8px 18px rgba(0,0,0,0.1); }
    .action-btn:active { transform: scale(0.96); }
    .action-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none !important; }

    /* Error */
    .error-msg {
      color: #e11d48;
      font-size: 0.72rem;
      margin-top: 0.2rem;
      padding-left: 0.5rem;
      display: none;
    }

    /* Footer link */
    .switch-link {
      text-align: center;
      margin-top: 1.2rem;
      font-size: 0.82rem;
      color: #5b6e8c;
    }

    .switch-link a {
      color: #4f46e5;
      font-weight: 700;
      text-decoration: none;
      margin-left: 4px;
    }

    .switch-link a:hover { text-decoration: underline; }

    .terms-note {
      font-size: 0.7rem;
      text-align: center;
      color: #5b6e8c;
      margin-top: 0.8rem;
      line-height: 1.4;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 2rem; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #0f172a;
      color: #fff;
      padding: 0.7rem 1.6rem;
      border-radius: 2rem;
      font-size: 0.85rem;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      z-index: 999;
      white-space: nowrap;
    }

    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.success { background: #166534; }
    .toast.error   { background: #991b1b; }

    .footer-attribution {
      text-align: center;
      margin-top: 1.8rem;
      font-size: 0.7rem;
      color: #7f8c9b;
      display: flex;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .footer-attribution span i { margin-right: 4px; }

    @media (max-width: 480px) {
      body { padding: 1rem; }
      .hero-section h1 { font-size: 2.2rem; }
      .auth-card { padding: 1.6rem; }
    }
  </style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="page-wrapper">

  <div class="hero-section">
    <div class="badge-row">
      <div class="free-badge">
        <i class="fas fa-gem" style="font-size:0.7rem"></i> ultramax vipro
      </div>
    </div>
    <h1>SIGN IN</h1>
    <p>Welcome back — let's check your text.</p>
  </div>

  <div class="auth-card">
    <div class="card-header">
      <h2>Hello again 👋</h2>
      <div class="card-sub">
        <i class="fas fa-user"></i> Sign in with your account
      </div>
    </div>

    <form id="signinForm">
      <div class="input-group">
        <label>Username</label>
        <div class="input-field">
          <i class="far fa-user"></i>
          <input type="text" id="signinUsername" placeholder="Enter your username" autocomplete="username">
        </div>
      </div>
      <div class="input-group">
        <label>Password</label>
        <div class="input-field">
          <i class="fas fa-lock"></i>
          <input type="password" id="signinPassword" placeholder="········" autocomplete="current-password">
        </div>
        <div id="signinError" class="error-msg"></div>
      </div>

      <button type="submit" class="action-btn" id="signinBtn">
        <i class="fas fa-arrow-right-to-bracket"></i> SIGN IN
      </button>
    </form>

    <div class="terms-note">
      <i class="fas fa-shield-alt"></i> Secure login — we value your privacy
    </div>

    <div class="switch-link">
      Don't have an account?
      <a href="register.html">Create one &rarr;</a>
    </div>
  </div>

  <div class="footer-attribution">
    <span><i class="far fa-copyright"></i> created by group 7</span>
  </div>

</div>

<script>
  const BASE_URL = "http://localhost:5000";

  if (localStorage.getItem("token")) {
    window.location.href = "index.html";
  }

  function showToast(msg, kind = "") {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.className = "toast show" + (kind ? " " + kind : "");
    setTimeout(() => t.classList.remove("show"), 3200);
  }

  function setError(id, msg) {
    const el = document.getElementById(id);
    if (!el) return;
    el.textContent = msg;
    el.style.display = msg ? "block" : "none";
  }

  ["signinUsername", "signinPassword"].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.addEventListener("focus", () => setError("signinError", ""));
  });

  document.getElementById("signinForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const username = document.getElementById("signinUsername").value.trim();
    const password = document.getElementById("signinPassword").value;
    const btn = document.getElementById("signinBtn");

    if (!username) { setError("signinError", " Username is required"); return; }
    if (!password)  { setError("signinError", " Please enter your password"); return; }

    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in…';

    try {
      const res  = await fetch(`${BASE_URL}/auth/login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password }),
      });
      const data = await res.json();

      if (!res.ok) {
        setError("signinError" + (data.error || "Login failed"));
        return;
      }

      localStorage.setItem("token",    data.token);
      localStorage.setItem("username", username);
      showToast("Welcome back, " + username + "!", "success");
      setTimeout(() => window.location.href = "index.html", 900);

    } catch (err) {
      setError("signinError", "Network error: " + err.message);
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-arrow-right-to-bracket"></i> SIGN IN';
    }
  });
</script>
</body>
</html>
